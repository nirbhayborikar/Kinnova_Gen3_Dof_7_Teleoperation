services:

  follower:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kinova_follower
    privileged: true
    network_mode: host
    ipc: host
    stdin_open: true
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
      - $XAUTHORITY:/root/.Xauthority

      # ── Live-mount your source — edit follower_node.py on host, ──────────
      # restart container, no image rebuild needed

      - /home/nirbhayborikar/framework/Kinnova_Gen3_Dof_7_Teleoperation/teleoperation_with_apriltags/ros2_ws/src/docker/src:/root/follower_ws/src

      # ── Params file — tune kp, alpha, max_vel, workspace box here ────────
      #- ./config/follower_params.yaml:/config/follower_params.yaml

    command:
      - bash
      - -c
      - |
        source /opt/ros/jazzy/setup.bash &&

        # ── Build the follower package ──────────────────────────────────────
        cd /follower_ws &&
        colcon build --packages-select apriltag_follower --symlink-install &&
        source install/setup.bash &&

        # # ── Wait for kortex arm driver to be ready ──────────────────────────
