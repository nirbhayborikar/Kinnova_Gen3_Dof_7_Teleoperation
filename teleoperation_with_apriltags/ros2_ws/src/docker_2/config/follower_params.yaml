# =============================================================================
# config/follower_params.yaml
# All follower parameters in one place.
# Change here and restart container — no image rebuild needed.
# =============================================================================

apriltag_follower:
  ros__parameters:

    # ── Control ───────────────────────────────────────────────────────────────
    kp: 0.8           # Proportional gain — start low (0.3), increase slowly
    alpha: 0.15       # EMA filter weight: lower = smoother but more lag
    max_vel: 0.08     # Max linear velocity m/s — keep ≤ 0.10 at first
    deadband: 0.012   # Min position error (m) to trigger motion
    safe_offset: 0.15 # How far (m) gripper stays from the tag (your hand)
    control_rate: 20.0  # Hz

    # ── Workspace box (base_link frame, metres) ───────────────────────────────
    # Measure your table and set these — arm will NEVER leave this box
    x_min:  0.20
    x_max:  0.70
    y_min: -0.40
    y_max:  0.40
    z_min:  0.10
    z_max:  0.60

    # ── Safety timing ─────────────────────────────────────────────────────────
    tag_loss_timeout: 0.50  # seconds — stop arm if tag disappears

    # ── TF frame names (must match your kortex TF tree) ───────────────────────
    # Verify with: ros2 run tf2_tools view_frames
    tag_frame:  "tag36h11:0"   # published by apriltag container
    base_frame: "base_link"    # kortex robot base
    eef_frame:  "tool_frame"   # kortex end-effector