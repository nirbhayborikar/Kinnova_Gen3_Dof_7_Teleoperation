sensagram_teleop:
  ros__parameters:
    # ========== NETWORK ==========
    udp_port: 5005
    
    # ========== CONTROL ==========
    control_rate_hz: 50.0
    
    # ========== VELOCITY LIMITS ==========
    max_linear_velocity: 0.1   #0.05 #     # m/s - forward/backward speed #0.3
    max_angular_velocity: 0.15  #0.15 #0.8     # rad/s - rotation speed #0.8 
    
    # ========== ACCELERATION LIMITS ==========
    max_linear_accel: 0.5    #1.0      # m/s² - how quickly speed can change #1.0
    max_angular_accel: 0.5 #0.5       # rad/s² - how quickly rotation changes #2.0
    
    # ========== FILTERING ==========
    deadzone: 0.02 #0.02              # Ignore small tilts (rad) ~0.3 degrees  #0.005
    smoothing_factor: 0.5 #0.5          # Smoothing (0=none, 1=max) #0.3
    
    # ========== SAFETY ==========
    timeout_ms: 500.0             # Stop if no data for 500ms
    max_consecutive_timeouts: 3   # Allow 3 missed packets
    
    # ========== ORIENTATION SCALING ==========
    gyro_linear_scale: 0.8 #0.3        # Tilt angle → linear velocity # 0.8  
    gyro_angular_scale: 0.5     # 1.5   # Rotation → angular velocity #1.5
    
    # ========== COORDINATE MAPPING ==========
    invert_x: false               # Left/right
    invert_y: true                # Forward/back
    invert_z: false                # Rotation #true



    # invert_x: false   # Roll → Y (left/right)
    # invert_y: false   # Pitch → X (forward/back)
    # invert_z: false   # Yaw → Z (up/down)



















