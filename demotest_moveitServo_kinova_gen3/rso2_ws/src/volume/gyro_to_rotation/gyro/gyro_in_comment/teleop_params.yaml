sensagram_teleop:
  ros__parameters:
    udp_port: 5005
    control_rate_hz: 50.0
    max_linear_velocity: 0.1
    max_angular_velocity: 0.3
    max_linear_accel: 0.5
    max_angular_accel: 1.0
    deadzone: 0.02
    smoothing_factor: 0.5
    timeout_ms: 500.0
    max_consecutive_timeouts: 3
    orientation_linear_scale: 0.5
    orientation_angular_scale: 1.0
    invert_x: false
    invert_y: false
    invert_z: false



















































