servo_node:
  ros__parameters:
    publish_period: 0.01
    max_expected_latency: 0.1
    command_in_type: "unitless"
    
    scale:
      linear: 0.6 # 0.15
      rotational: 0.3
      joint: 0.01
    
    publish_joint_positions: true
    publish_joint_velocities: true # test 2
    publish_joint_accelerations: false
    
    use_smoothing: true
   
    #smoothing_filter_plugin_name: "online_signal_smoothing::ButterworthFilterPlugin"
    #smoothing_filter_plugin_name: "online_signal_smoothing::AccelerationLimitedPlugin"
    
    is_primary_planning_scene_monitor: true
    check_octomap_collisions: false
    move_group_name: arm


    planning_frame: base_link # the moveit planning frame
    
    # ========== SINGULARITY ==========
    lower_singularity_threshold: 8.0 # lower =lesss strict #15.0
    hard_stop_singularity_threshold: 20.0 # lower =lesss strict  #30.0
    leaving_singularity_threshold_multiplier: 5.0 # #3.0 higher = easier escape 
    
    # ========== JOINT LIMITS ==========
    # joint_limit_margins: [0.1, 0.2, 0.25, 0.15, 0.2, 0.15, 0.1]
    joint_limit_margins: [0.05, 0.15, 0.2, 0.15, 0.15, 0.05, 0.05] # 6-->0.1-->0.05 , as it is wrist joint 


    # ========== TOPICS ==========
    cartesian_command_in_topic: servo_node/delta_twist_cmds
    joint_command_in_topic: servo_node/delta_joint_cmds
    joint_topic: /joint_states
    status_topic: ~/status
    command_out_type: trajectory_msgs/JointTrajectory
    command_out_topic: /joint_trajectory_controller/joint_trajectory
    
    # ========== COLLISION ==========
    check_collisions: true
    collision_check_rate: 10.0
    self_collision_proximity_threshold: 0.01 # m
    scene_collision_proximity_threshold: 0.02 # m
    
    # ========== SAFETY ==========new added
    halt_all_joints_in_joint_mode: false
    halt_all_joints_in_cartesian_mode: false
    override_velocity_scaling_factor: 0.8 #joint_limit_margins
