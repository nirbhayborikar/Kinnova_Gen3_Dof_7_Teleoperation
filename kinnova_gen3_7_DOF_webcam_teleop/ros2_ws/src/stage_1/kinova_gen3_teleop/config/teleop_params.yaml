hand_pose_publisher:
  ros__parameters:
    camera_id: 0
    rate: 30.0
    show_camera: true
    pinch_threshold: 0.07
    alpha: 0.4
    dead_zone: 0.005
    max_vel: 0.08
    max_rotation: 1.57      # ±90 degrees

    # Kinova Gen3 workspace (meters, relative to base_link)
    robot_x_min: 0.2
    robot_x_max: 0.6
    robot_y_min: -0.3
    robot_y_max: 0.3
    robot_z_min: 0.1
    robot_z_max: 0.6

arm_controller:
  ros__parameters: {}
